<div>
  <h2>Gestión de Usuarios</h2>
  <button class="btn-agregar" (click)="abrirModal()">Crear Usuario</button>
</div>

<table>
  <thead>
    <tr>
      <th>Usuario</th>
      <th>Email</th>
      <th>Rol</th>
      <th>Permisos</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let usuario of usuarios" (click)="abrirModal(usuario)">
      <td>
        <div class="usuario-info">
          <strong>{{ usuario.nombre }}</strong>
        </div>
      </td>
      <td>{{ usuario.email }}</td>
      <td>
        <span class="rol-badge" [ngClass]="(usuario.rol || 'Sin-rol').toLowerCase()">
          {{ usuario.rol || 'Sin rol' }}
        </span>
      </td>
      <td>{{ usuario.permisos }}</td>
    </tr>
  </tbody>
</table>

<div class="modal-backdrop" *ngIf="mostrarModal">
  <div class="modal">
    <div class="modal-header">
      <h3 *ngIf="!modoEdicion">Crear nuevo usuario</h3>
      <h3 *ngIf="modoEdicion">Editar Usuario</h3>
      <button class="close-btn" (click)="cerrarModal()">X</button>
    </div>

    <form
      #usuarioFormRef="ngForm"
      (ngSubmit)="modoEdicion ? actualizarUsuario() : registrarUsuario()"
    >
      <div></div>
    </form>
  </div>
</div>
